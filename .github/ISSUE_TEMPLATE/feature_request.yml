name: ✨ Feature Request
description: Suggest a new skill, feature, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature or skill you want added
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What problem does this solve? How would you use it?
    validations:
      required: true
